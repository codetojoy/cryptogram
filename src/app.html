<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#9c4632" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<style>
			/*
			 * Self-hosted fonts (no network calls at runtime — privacy, SPEC §3).
			 * Lato & Lora, both SIL OFL; provenance in ASSETS.md. URLs use
			 * %sveltekit.assets% so they resolve under the base path for subpath
			 * hosting (e.g. GitHub Pages project site).
			 */
			@font-face {
				font-family: 'Lato';
				font-style: normal;
				font-weight: 400;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/lato-400.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Lato';
				font-style: italic;
				font-weight: 400;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/lato-400-italic.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Lato';
				font-style: normal;
				font-weight: 700;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/lato-700.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Lora';
				font-style: normal;
				font-weight: 600;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/lora-600.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Lora';
				font-style: italic;
				font-weight: 400;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/lora-400-italic.woff2') format('woff2');
			}
		</style>
		<script>
			/*
			 * Apply the saved theme (TODO-011) before first paint so Prince users
			 * don't see a flash of the Original palette on cold load. Reads the same
			 * localStorage key/label the app uses; falls back silently to Original.
			 * No network (privacy, SPEC §3). The app re-asserts this on hydration.
			 */
			(function () {
				try {
					var raw = localStorage.getItem('cryptogram.settings.v1');
					var label = raw ? JSON.parse(raw).theme : 'Original';
					var themes = {
						Original: { id: 'original', color: '#9c4632' },
						Prince: { id: 'prince', color: '#7b2cbf' },
						Dark: { id: 'dark', color: '#4f8ef0' },
						Bengal: { id: 'bengal', color: '#d9631a' }
					};
					var theme = themes[label] || themes.Original;
					document.documentElement.setAttribute('data-theme', theme.id);
					var meta = document.querySelector('meta[name="theme-color"]');
					if (meta) meta.setAttribute('content', theme.color);
				} catch (e) {
					/* storage unavailable — Original (the base :root) applies */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
